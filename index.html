<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Flappy Bird — Faby</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <canvas id="game" width="800" height="600"></canvas>
    <p class="hint">
      <kbd>Space</kbd> / <kbd>Click</kbd> flap &nbsp;·&nbsp;
      <kbd>P</kbd> pause &nbsp;·&nbsp;
      <kbd>R</kbd> restart &nbsp;·&nbsp;
      <kbd>M</kbd> mute
    </p>
  </main>
  <div id="nick-overlay" hidden>
    <div class="nick-box">
      <h2>Name for the leaderboard</h2>
      <input id="nick-input" maxlength="12" placeholder="e.g. Faby" autocomplete="off" spellcheck="false" />
      <div class="nick-actions">
        <button id="nick-skip" type="button">Skip</button>
        <button id="nick-ok" type="button">Save</button>
      </div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
